<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)"/>
  
  <!-- 镜片轮廓 - 双凸透镜形状 -->
  <!-- 上弧线 -->
  <path d="M 48 128 Q 48 50 128 50" stroke="white" stroke-width="4" fill="url(#lensGrad)" opacity="0.9"/>
  <!-- 下弧线 -->
  <path d="M 208 128 Q 208 50 128 50" stroke="white" stroke-width="4" fill="none"/>
  <!-- 左侧弧 -->
  <path d="M 48 128 Q 48 206 128 206" stroke="white" stroke-width="4" fill="none"/>
  <!-- 右侧弧 -->
  <path d="M 208 128 Q 208 206 128 206" stroke="white" stroke-width="4" fill="none"/>
  
  <!-- 中心线 -->
  <line x1="48" y1="128" x2="208" y2="128" stroke="white" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  
  <!-- 文字 "Lens" -->
  <text x="128" y="140" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">Lens</text>
</svg>
